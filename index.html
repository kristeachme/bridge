<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bridge Quest</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  margin:0;
  padding:0;
  overflow:hidden;
  background:transparent;
  font-family:Arial,sans-serif;
}

#game{
  position:absolute;
  left:0;
  top:0;
  width:1600px;
  height:900px;
  overflow:hidden;
  background:transparent;
  transform-origin:top left;
}

/* UI */

#topUI{
  position:absolute;
  top:18px;
  left:30px;
  right:30px;
  z-index:300;
  display:grid;
  grid-template-columns:240px 1fr 280px;
  gap:24px;
  align-items:start;
  pointer-events:none;
}

.ui-panel{
  min-height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:8px 16px;
  border-radius:18px;
  background:rgba(255,255,255,.10);
  border:2px solid rgba(180,255,255,.45);
  box-shadow:0 0 14px rgba(70,220,255,.28);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  pointer-events:auto;
}

.heart{
  width:42px;
  height:42px;
  object-fit:contain;
  filter:drop-shadow(0 0 7px rgba(255,40,80,.72));
}

#inventory{
  gap:6px;
  max-width:1050px;
  margin:0 auto;
}

.collect-slot{
  width:38px;
  height:38px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.9);
  opacity:.75;
}

.collect-slot.filled{
  border:none;
  background:url("https://github.com/kristeachme/bridge/blob/main/%D0%BB%D0%B5%D0%B4.png?raw=true") center/contain no-repeat;
  filter:drop-shadow(0 0 10px #7ffcff);
  opacity:1;
}

#muteBtn{
  border:none;
  background:transparent;
  font-size:26px;
  cursor:pointer;
}

#volume{
  width:110px;
  accent-color:#75f7ff;
}

/* HERO */

#hero{
  position:absolute;
  width:240px;
  height:auto;
  z-index:120;
  transition:.45s ease;
  transform-origin:center bottom;
  filter:drop-shadow(0 10px 12px rgba(0,0,0,.28));
  pointer-events:none;
}

/* PLATFORMS */

.platform{
  position:absolute;
  width:190px;
  height:100px;
  z-index:50;
  transition:.35s;
  filter:grayscale(1) brightness(.55);
  opacity:.72;
}

.platform img{
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
}

.platform.active,
.platform.completed{
  filter:none;
  opacity:1;
}

.platform.wobble{
  animation:wobble .45s ease;
}

@keyframes wobble{
  0%,100%{transform:translateY(0) rotate(0deg)}
  25%{transform:translateY(4px) rotate(-2deg)}
  50%{transform:translateY(-3px) rotate(2deg)}
  75%{transform:translateY(2px) rotate(-1deg)}
}

/* COLLECTIBLE */

.collectible{
  position:absolute;
  width:64px;
  height:64px;
  z-index:200;
  cursor:pointer;
  animation:float 1.5s ease-in-out infinite;
  filter:drop-shadow(0 0 14px #7ffcff);
}

.collectible img{
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
}

@keyframes float{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-10px) scale(1.04)}
}

.collectible.active-item{
  animation:
    float 1.5s ease-in-out infinite,
    pulseGlow 1.2s ease-in-out infinite;

  filter:
    brightness(1.15)
    drop-shadow(0 0 8px #4dff73)
    drop-shadow(0 0 18px #4dff73)
    drop-shadow(0 0 36px #39ff68)
    drop-shadow(0 0 58px rgba(57,255,104,1))
    drop-shadow(0 0 85px rgba(57,255,104,.95));
}

@keyframes pulseGlow{
  0%,100%{
    opacity:1;
  }

  50%{
    opacity:.7;
  }
}

/* QUESTION */

#questionBox{
  position:absolute;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  width:760px;
  min-height:250px;
  z-index:420;
  display:none;
}

#questionPanelImg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:fill;
  z-index:1;
  pointer-events:none;
  filter:drop-shadow(0 0 24px rgba(90,240,255,.7));
}

#questionContent{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  padding:48px 58px 34px;
  text-align:center;
  color:white;
}

#questionText{
  font-size:34px;
  font-weight:900;
  margin-bottom:24px;
  text-shadow:0 3px 8px rgba(0,0,0,.55);
}

.answers{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.answer{
  min-height:62px;
  border:2px solid rgba(140,255,255,.9);
  border-radius:16px;
  background:rgba(0,80,100,.35);
  color:white;
  font-size:24px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 14px rgba(90,240,255,.55);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

.answer:hover{
  transform:translateY(-2px);
  box-shadow:0 0 22px rgba(90,240,255,.95);
}

.input-row{
  display:flex;
  gap:14px;
  justify-content:center;
  align-items:center;
}

#textAnswer{
  width:460px;
  height:62px;
  border:2px solid rgba(140,255,255,.9);
  border-radius:16px;
  background:rgba(0,80,100,.35);
  color:white;
  font-size:26px;
  font-weight:800;
  padding:0 20px;
  outline:none;
}

#textAnswer::placeholder{
  color:rgba(255,255,255,.65);
}

#checkInputBtn{
  height:62px;
  border:none;
  border-radius:16px;
  padding:0 24px;
  background:#35d4e8;
  color:white;
  font-size:22px;
  font-weight:900;
  cursor:pointer;
}

/* START */

#startScreen{
  position:absolute;
  inset:0;
  z-index:500;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.35);
}

.modal{
  width:560px;
  padding:30px;
  border-radius:26px;
  text-align:center;
  color:white;
  background:rgba(0,90,110,.35);
  border:2px solid rgba(160,255,255,.9);
  box-shadow:0 0 30px rgba(90,240,255,.8);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}

.modal h1{
  font-size:38px;
  margin-bottom:12px;
}

.modal p{
  font-size:21px;
  line-height:1.4;
}

.modal button{
  margin-top:22px;
  border:none;
  border-radius:20px;
  background:#35d4e8;
  color:white;
  font-size:26px;
  font-weight:900;
  padding:14px 38px;
  cursor:pointer;
}

/* EFFECTS */

.jump{animation:jump .45s ease}

@keyframes jump{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-60px)}
}

.shake{animation:shake .35s ease}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
}

.fall{animation:fall 1s forwards}

@keyframes fall{
  to{
    transform:translateY(650px) rotate(80deg) scale(.55);
    opacity:0;
  }
}

.particle{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#7ffcff;
  box-shadow:0 0 12px #7ffcff;
  z-index:600;
  pointer-events:none;
  animation:pop .65s forwards;
}

@keyframes pop{
  to{
    transform:translate(var(--dx),var(--dy)) scale(0);
    opacity:0;
  }
}

#message{
  display:none !important;
  position:absolute;
  left:50%;
  bottom:34px;
  transform:translateX(-50%);
  z-index:430;
  display:none;
  color:white;
  font-size:23px;
  font-weight:900;
  padding:12px 22px;
  border-radius:16px;
  background:rgba(0,80,100,.4);
  border:2px solid rgba(140,255,255,.9);
  box-shadow:0 0 18px rgba(90,240,255,.65);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

/* FINAL FIREWORKS */

.firework{
  position:absolute;
  width:10px;
  height:10px;
  z-index:999;
  pointer-events:none;
}

.spark{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:radial-gradient(circle,#ffffff 0%,#7dffb3 35%,#00ff88 70%,transparent 100%);
  box-shadow:0 0 12px #00ff88,0 0 28px #00ff88;
  animation:explode 1.4s ease-out forwards;
}

@keyframes explode{
  from{
    transform:translate(0,0) scale(1);
    opacity:1;
  }
  to{
    transform:translate(var(--dx),var(--dy)) scale(0);
    opacity:0;
  }
}


#muteBtn{
  width:54px;
  height:54px;
  border:none;
  background:transparent;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

#soundIcon{
  width:100%;
  height:100%;
  object-fit:contain;
  filter:drop-shadow(0 0 10px rgba(120,255,255,.8));
  transition:.25s;
}

#muteBtn:hover #soundIcon{
  transform:scale(1.08);
}

/* GLASS INVENTORY */

.collect-slot{
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.92);

  background:
    radial-gradient(circle at 30% 30%,
      rgba(255,255,255,.22),
      rgba(255,255,255,.05));

  box-shadow:
    inset 0 0 10px rgba(255,255,255,.12),
    0 0 10px rgba(0,255,170,.18);

  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);

  opacity:.9;

  transition:.25s;
}

.collect-slot.filled{
  border:2px solid rgba(120,255,190,.95);

  background:
    url("https://github.com/kristeachme/bridge/blob/main/%D0%BB%D0%B5%D0%B4.png?raw=true")
    center/78% no-repeat,

    radial-gradient(circle,
      rgba(0,255,170,.22),
      rgba(255,255,255,.05));

  box-shadow:
    0 0 12px rgba(0,255,170,.55),
    0 0 24px rgba(0,255,170,.35);

  opacity:1;
}

</style>
</head>

<body>

<div id="game">

  <div id="topUI">
    <div class="ui-panel" id="lives"></div>
    <div class="ui-panel" id="inventory"></div>
    <div class="ui-panel">
      <button id="muteBtn">
<img src="https://github.com/kristeachme/bridge/blob/main/aa478d14-bb81-4a17-80e0-3ce61d48fe54.png?raw=true" id="soundIcon">
</button>
      <input type="range" id="volume" min="0" max="100" value="70">
    </div>
  </div>

  <img id="hero" src="https://github.com/kristeachme/bridge/blob/main/3.png?raw=true">

  <div id="questionBox">
    <img id="questionPanelImg" src="https://github.com/kristeachme/bridge/blob/main/%D0%BE%D0%BA%D0%BD%D0%BE.png?raw=true">
    <div id="questionContent">
      <h2 id="questionText"></h2>
      <div id="answerArea"></div>
    </div>
  </div>

  <div id="startScreen">
    <div class="modal">
      <h1>Ледяной мост</h1>
      <p>Помоги Герде собрать осколки льда, попасть в Ледяной Замок и освободить Кая.</p>
      <button id="startBtn">ВПЕРЕД</button>
    </div>
  </div>

  <div id="message"></div>

</div>

<script>
const ASSETS = {
  hero: "https://github.com/kristeachme/bridge/blob/main/3.png?raw=true",
  collectible: "https://github.com/kristeachme/bridge/blob/main/%D0%BB%D0%B5%D0%B4.png?raw=true",
  questionPanel: "https://github.com/kristeachme/bridge/blob/main/%D0%BE%D0%BA%D0%BD%D0%BE.png?raw=true",
  platform: "https://github.com/kristeachme/bridge/blob/main/1.png?raw=true",
  heart: "https://github.com/kristeachme/bridge/blob/main/4.png?raw=true"
};

const CONFIG = {
  platformCount: 12,
  startX: 165,
  baseY: 500,
  spacing: 88,
  wave: 3,
  arcDepth: 10,
  lives: 3,
  volume: 0.7,
  sound: true,

  questions: [
    {type:"quiz", q:"Сколько будет 2 + 3?", a:["4","5","6","7"], c:1},
    {type:"quiz", q:"Сколько будет 4 + 4?", a:["6","7","8","9"], c:2},
    {type:"quiz", q:"Сколько будет 6 + 2?", a:["7","8","9","10"], c:1},
    {type:"quiz", q:"Сколько будет 5 + 5?", a:["8","9","10","11"], c:2},
    {type:"quiz", q:"Сколько будет 7 + 3?", a:["9","10","11","12"], c:1},
    {type:"quiz", q:"Сколько будет 8 + 4?", a:["10","11","12","13"], c:2},

    {type:"input", q:"Впиши ответ: 3 + 4 = ?", c:["7","семь"]},
    {type:"input", q:"Впиши ответ: 5 + 6 = ?", c:["11","одиннадцать"]},
    {type:"input", q:"Впиши ответ: 7 + 7 = ?", c:["14","четырнадцать"]},
    {type:"input", q:"Впиши ответ: 9 + 3 = ?", c:["12","двенадцать"]},
    {type:"input", q:"Впиши ответ: 10 + 5 = ?", c:["15","пятнадцать"]},
    {type:"input", q:"Впиши ответ: 8 + 8 = ?", c:["16","шестнадцать"]}
  ]
};

const game = document.getElementById("game");
const hero = document.getElementById("hero");
const startScreen = document.getElementById("startScreen");
const questionBox = document.getElementById("questionBox");
const questionText = document.getElementById("questionText");
const answerArea = document.getElementById("answerArea");
const livesBox = document.getElementById("lives");
const inventory = document.getElementById("inventory");
const message = document.getElementById("message");

let state;
let platforms = [];
let collectibles = [];
let selectedPlatform = null;
let audioCtx = null;

function init(){
  state = {
    started:false,
    step:0,
    lives:CONFIG.lives,
    collected:0,
    gameOver:false
  };

  platforms.forEach(el => el.remove());
  collectibles.forEach(el => el.remove());

  platforms = [];
  collectibles = [];

  createPath();
  setHeroStart();
  renderUI();

  questionBox.style.display = "none";
}

function createPath(){
  for(let i = 0; i < CONFIG.platformCount; i++){
    const t = i / (CONFIG.platformCount - 1);
    const x = CONFIG.startX + i * CONFIG.spacing;
    const y = CONFIG.baseY + Math.sin(Math.PI * t) * CONFIG.arcDepth + Math.sin(i * .8) * CONFIG.wave;

    const platform = document.createElement("div");
    platform.className = "platform";
    platform.style.left = x + "px";
    platform.style.top = y + "px";
    platform.innerHTML = `<img src="${ASSETS.platform}">`;

    platforms.push(platform);
    game.appendChild(platform);

    const collectible = document.createElement("div");
    collectible.className = "collectible";
    collectible.style.left = (x + 70) + "px";
    collectible.style.top = (y - 82) + "px";
    collectible.innerHTML = `<img src="${ASSETS.collectible}">`;
    collectible.onclick = () => collectItem(i, collectible);

    collectibles.push(collectible);
    game.appendChild(collectible);
  }
}

function setHeroStart(){
  hero.className = "";
  hero.style.opacity = "1";
  hero.style.transform = "none";
  hero.style.left = "-10px";
  hero.style.top = (CONFIG.baseY - 190) + "px";
}

document.getElementById("startBtn").onclick = () => {
  ensureAudio();
  state.started = true;
  startScreen.style.display = "none";
  updateActiveCollectible();
};

function collectItem(index, item){
  if(!state.started || state.gameOver) return;
  if(index !== state.step) return;

  item.classList.remove("active-item");

  playSound("collect");
  createParticles(item);
  item.remove();

  state.collected++;
  selectedPlatform = platforms[index];
  selectedPlatform.classList.add("active");

  renderUI();

  setTimeout(() => jumpToPlatform(selectedPlatform), 180);
  setTimeout(() => showQuestion(index), 740);
}

function jumpToPlatform(platform){
  playSound("jump");

  hero.classList.remove("jump");
  void hero.offsetWidth;
  hero.classList.add("jump");

  platform.classList.remove("wobble");
  void platform.offsetWidth;
  platform.classList.add("wobble");

  hero.style.left = (parseInt(platform.style.left) - 26) + "px";
  hero.style.top = (parseInt(platform.style.top) - 180) + "px";
}

function showQuestion(index){
  const q = CONFIG.questions[index % CONFIG.questions.length];

  questionText.textContent = q.q;
  answerArea.innerHTML = "";

  if(q.type === "quiz"){
    const grid = document.createElement("div");
    grid.className = "answers";

    q.a.forEach((answer,index) => {
      const btn = document.createElement("button");
      btn.className = "answer";
      btn.textContent = answer;
      btn.onclick = () => checkQuizAnswer(index);
      grid.appendChild(btn);
    });

    answerArea.appendChild(grid);
  }

  if(q.type === "input"){
    const row = document.createElement("div");
    row.className = "input-row";
    row.innerHTML = `
      <input id="textAnswer" type="text" placeholder="Введи ответ..." autocomplete="off">
      <button id="checkInputBtn">Проверить</button>
    `;

    answerArea.appendChild(row);

    document.getElementById("checkInputBtn").onclick = checkInputAnswer;
    document.getElementById("textAnswer").addEventListener("keydown", e => {
      if(e.key === "Enter") checkInputAnswer();
    });

    setTimeout(() => document.getElementById("textAnswer").focus(), 80);
  }

  questionBox.style.display = "block";
}

function checkQuizAnswer(answerIndex){
  const q = CONFIG.questions[state.step % CONFIG.questions.length];

  if(answerIndex === q.c){
    correctAnswer();
  } else {
    wrongAnswer();
  }
}

function checkInputAnswer(){
  const q = CONFIG.questions[state.step % CONFIG.questions.length];
  const input = document.getElementById("textAnswer");
  const userAnswer = normalize(input.value);
  const correctAnswers = q.c.map(normalize);

  if(correctAnswers.includes(userAnswer)){
    correctAnswer();
  } else {
    wrongAnswer();
  }
}

function normalize(str){
  return String(str).trim().toLowerCase().replace(/[.!?]/g,"");
}

function correctAnswer(){
  playSound("correct");

  questionBox.style.display = "none";

  selectedPlatform.classList.remove("active");
  selectedPlatform.classList.add("completed");

  state.step++;

  if(state.step >= CONFIG.platformCount){
    playSound("finish");
    finalJump();

    setTimeout(() => {
      startFireworks();
    }, 500);


  } else {
    updateActiveCollectible();
  }
}

function wrongAnswer(){
  playSound("wrong");

  state.lives--;
  renderUI();

  hero.classList.remove("shake");
  void hero.offsetWidth;
  hero.classList.add("shake");

  if(state.lives <= 0){
    questionBox.style.display = "none";
    gameOver();
  } else {
    setTimeout(() => showQuestion(state.step), 700);
  }
}

function gameOver(){
  state.gameOver = true;

  playSound("fall");
  hero.classList.add("fall");

  setTimeout(() => {
    startScreen.style.display = "flex";
    init();
  }, 1700);
}

function renderUI(){
  livesBox.innerHTML = "";

  for(let i = 0; i < state.lives; i++){
    livesBox.innerHTML += `<img class="heart" src="${ASSETS.heart}">`;
  }

  inventory.innerHTML = "";

  for(let i = 0; i < CONFIG.platformCount; i++){
    const slot = document.createElement("div");
    slot.className = "collect-slot";

    if(i < state.collected){
      slot.classList.add("filled");
    }

    inventory.appendChild(slot);
  }
}

function showMessage(text){
  message.textContent = text;
  message.style.display = "block";

  clearTimeout(message.timer);

  message.timer = setTimeout(() => {
    message.style.display = "none";
  }, 2200);
}

document.getElementById("muteBtn").onclick = () => {
  CONFIG.sound = !CONFIG.sound;
  document.getElementById("muteBtn").textContent = CONFIG.sound ? "🔊" : "🔇";
};

document.getElementById("volume").oninput = e => {
  CONFIG.volume = e.target.value / 100;
};

function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

function tone(freq,duration,type="sine"){
  if(!CONFIG.sound || CONFIG.volume <= 0) return;

  ensureAudio();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = .08 * CONFIG.volume;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.exponentialRampToValueAtTime(
    .001,
    audioCtx.currentTime + duration
  );

  osc.stop(audioCtx.currentTime + duration);
}

function playSound(type){
  if(type === "collect"){
    tone(880,.08,"triangle");
    setTimeout(() => tone(1320,.1,"triangle"),70);
  }

  if(type === "jump"){
    tone(360,.08,"square");
  }

  if(type === "correct"){
    tone(760,.1,"triangle");
    setTimeout(() => tone(1040,.1,"triangle"),80);
  }

  if(type === "wrong"){
    tone(180,.16,"sawtooth");
  }

  if(type === "fall"){
    tone(190,.25,"sawtooth");
    setTimeout(() => tone(90,.35,"sawtooth"),120);
  }

  if(type === "finish"){
    [520,660,780,1040].forEach((freq,index) => {
      setTimeout(() => tone(freq,.15,"triangle"), index * 120);
    });
  }
}

function createParticles(element){
  const rect = element.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();

  const cx = rect.left - gameRect.left + rect.width / 2;
  const cy = rect.top - gameRect.top + rect.height / 2;

  for(let i = 0; i < 16; i++){
    const particle = document.createElement("div");
    particle.className = "particle";

    particle.style.left = cx + "px";
    particle.style.top = cy + "px";

    const angle = Math.PI * 2 * i / 16;
    const distance = 42 + Math.random() * 30;

    particle.style.setProperty("--dx", Math.cos(angle) * distance + "px");
    particle.style.setProperty("--dy", Math.sin(angle) * distance + "px");

    game.appendChild(particle);

    setTimeout(() => particle.remove(), 700);
  }
}



function finalJump(){
  hero.classList.remove("jump");
  void hero.offsetWidth;
  hero.classList.add("jump");

  const currentX = parseInt(hero.style.left) || 0;
  const currentY = parseInt(hero.style.top) || 0;

  hero.style.left = (currentX + 220) + "px";
  hero.style.top = (currentY - 40) + "px";
}

function startFireworks(){
  for(let i = 0; i < 18; i++){
    setTimeout(() => {
      const firework = document.createElement("div");
      firework.className = "firework";
      firework.style.left = (window.innerWidth * (0.2 + Math.random() * 0.6)) + "px";
      firework.style.top = (100 + Math.random() * 260) + "px";

      game.appendChild(firework);

      for(let j = 0; j < 24; j++){
        const spark = document.createElement("div");
        spark.className = "spark";

        const angle = Math.PI * 2 * j / 24;
        const distance = 80 + Math.random() * 70;

        spark.style.setProperty("--dx", Math.cos(angle) * distance + "px");
        spark.style.setProperty("--dy", Math.sin(angle) * distance + "px");

        firework.appendChild(spark);
      }

      setTimeout(() => {
        firework.remove();
      }, 1600);

    }, i * 180);
  }
}

function updateActiveCollectible(){
  collectibles.forEach(el => el.classList.remove("active-item"));

  if(collectibles[state.step]){
    collectibles[state.step].classList.add("active-item");
  }
}



function fitGameToIframe(){
  const designW = 1600;
  const designH = 900;

  const scale = Math.min(
    window.innerWidth / designW,
    window.innerHeight / designH
  );

  const left = (window.innerWidth - designW * scale) / 2;
  const top = (window.innerHeight - designH * scale) / 2;

  game.style.transform = `scale(${scale})`;
  game.style.left = left + "px";
  game.style.top = top + "px";
}

window.addEventListener("resize", fitGameToIframe);
fitGameToIframe();


init();
</script>
