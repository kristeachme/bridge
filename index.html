<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emerald Path Quest</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:#071b12;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at 75% 22%, rgba(0,255,160,.25), transparent 16%),
    linear-gradient(to bottom, #0b3142 0%, #0c462e 52%, #16320f 100%);
}

/* BACKGROUND DECOR */
#sky-glow{
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 25%, rgba(65,255,175,.18), transparent 34%);
  animation:pulse 2.5s infinite alternate;
}

@keyframes pulse{
  from{opacity:.45;}
  to{opacity:1;}
}

#emerald-city{
  position:absolute;
  right:40px;
  top:110px;
  width:210px;
  height:260px;
  z-index:1;
  filter:drop-shadow(0 0 22px rgba(0,255,150,.9));
}

.tower{
  position:absolute;
  bottom:0;
  width:54px;
  background:linear-gradient(#23ff9a,#009957);
  border:4px solid #d7ffe6;
  border-radius:16px 16px 0 0;
}

.tower::before{
  content:"";
  position:absolute;
  left:50%;
  top:-48px;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:32px solid transparent;
  border-right:32px solid transparent;
  border-bottom:52px solid #35ffb2;
}

.tower.one{left:10px;height:150px;}
.tower.two{left:76px;height:225px;}
.tower.three{left:145px;height:175px;}

#title{
  position:absolute;
  top:22px;
  left:50%;
  transform:translateX(-50%);
  color:#fff8c7;
  font-size:42px;
  font-weight:900;
  letter-spacing:1px;
  text-shadow:0 4px 12px rgba(0,0,0,.35), 0 0 20px rgba(255,225,0,.55);
  z-index:40;
}

/* START SCREEN */
#startScreen{
  position:absolute;
  inset:0;
  z-index:300;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.52);
}

#missionBox{
  width:min(560px, 90vw);
  padding:30px;
  border-radius:28px;
  background:#fff7d1;
  border:6px solid #f5c542;
  text-align:center;
  box-shadow:0 18px 45px rgba(0,0,0,.35), 0 0 25px rgba(0,255,150,.65);
}

#missionBox h1{
  margin:0 0 12px;
  font-size:42px;
  color:#095a35;
}

#missionBox p{
  margin:0;
  color:#20422d;
  font-size:22px;
  line-height:1.45;
}

#startBtn{
  margin-top:24px;
  padding:17px 38px;
  border:0;
  border-radius:22px;
  background:linear-gradient(#ffe36c,#f7b500);
  color:#2a1d00;
  font-size:28px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 8px 0 #ba7d00, 0 12px 22px rgba(0,0,0,.22);
}

#startBtn:hover{
  transform:scale(1.04);
}

/* UI */
#ui{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:12px;
  z-index:80;
}

.ui-box{
  min-width:82px;
  padding:12px 16px;
  border-radius:18px;
  background:rgba(255,255,255,.94);
  color:#12351f;
  font-size:22px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
  text-align:center;
}

/* YELLOW BRICK PLATFORMS */
.platform{
  position:absolute;
  width:142px;
  height:54px;
  border-radius:14px;
  border:5px solid #8a5d00;
  background:
    linear-gradient(90deg, rgba(0,0,0,.15) 2px, transparent 2px) 0 0 / 35px 100%,
    linear-gradient(#ffd84d, #e8a900);
  box-shadow:inset 0 -9px 0 rgba(0,0,0,.14), 0 12px 18px rgba(0,0,0,.25);
  cursor:pointer;
  z-index:20;
  filter:grayscale(1) brightness(.38);
  opacity:.56;
  transition:.28s;
}

.platform.active{
  filter:none;
  opacity:1;
  box-shadow:0 0 22px rgba(255,230,0,.95), inset 0 -9px 0 rgba(0,0,0,.14), 0 12px 18px rgba(0,0,0,.25);
}

.platform.completed{
  filter:none;
  opacity:1;
}

.platform.locked{
  pointer-events:none;
}

.platform:hover{
  transform:scale(1.05);
}

/* COLLECTIBLE */
.collectible{
  position:absolute;
  width:52px;
  height:52px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #d9ffef, #00e083 48%, #00824d);
  border:4px solid #caffdf;
  box-shadow:0 0 18px rgba(0,255,150,.9);
  cursor:pointer;
  z-index:50;
  animation:float 1.6s infinite ease-in-out;
}

.collectible::after{
  content:"♦";
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  text-shadow:0 2px 5px rgba(0,0,0,.35);
}

@keyframes float{
  0%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-10px) rotate(8deg);}
  100%{transform:translateY(0) rotate(0deg);}
}

/* CHARACTER: ELLIE-STYLE GIRL */
#hero{
  position:absolute;
  width:90px;
  height:120px;
  z-index:70;
  transition:.45s ease;
}

.head{
  position:absolute;
  left:22px;
  top:0;
  width:48px;
  height:48px;
  background:#ffd8b0;
  border:4px solid #8d5a2b;
  border-radius:50%;
}

.hair{
  position:absolute;
  left:16px;
  top:-3px;
  width:60px;
  height:38px;
  background:#8b4a20;
  border-radius:50% 50% 20% 20%;
  z-index:-1;
}

.eye{
  position:absolute;
  top:22px;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#111;
}

.eye.left{left:13px;}
.eye.right{right:13px;}

.smile{
  position:absolute;
  left:17px;
  top:31px;
  width:16px;
  height:8px;
  border-bottom:3px solid #a25050;
  border-radius:50%;
}

.dress{
  position:absolute;
  left:16px;
  top:48px;
  width:58px;
  height:58px;
  background:#6ecbff;
  border:4px solid #287baa;
  clip-path:polygon(25% 0, 75% 0, 100% 100%, 0 100%);
}

.arm{
  position:absolute;
  top:55px;
  width:16px;
  height:42px;
  background:#ffd8b0;
  border:3px solid #8d5a2b;
  border-radius:12px;
}

.arm.left{left:4px; transform:rotate(18deg);}
.arm.right{right:4px; transform:rotate(-18deg);}

.shoe{
  position:absolute;
  top:103px;
  width:28px;
  height:14px;
  background:#ff3d3d;
  border-radius:12px;
  border:3px solid #9c1010;
}

.shoe.left{left:13px;}
.shoe.right{right:13px;}

/* QUESTION */
#questionBox{
  position:absolute;
  left:50%;
  top:18%;
  transform:translateX(-50%);
  width:min(520px, 90vw);
  background:#fff7d1;
  border:5px solid #f5c542;
  border-radius:26px;
  padding:24px;
  z-index:220;
  display:none;
  box-shadow:0 15px 40px rgba(0,0,0,.32);
}

#questionBox h2{
  margin:0 0 18px;
  text-align:center;
  color:#144725;
}

.answer{
  display:block;
  width:100%;
  margin-top:12px;
  padding:14px;
  border:0;
  border-radius:16px;
  background:white;
  color:#153a20;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 5px 0 #d6b242;
}

.answer:hover{
  background:#e9fff1;
}

#message{
  position:absolute;
  left:50%;
  bottom:32px;
  transform:translateX(-50%);
  background:rgba(255,255,255,.95);
  color:#0c4a29;
  padding:14px 24px;
  border-radius:18px;
  font-size:22px;
  font-weight:900;
  z-index:180;
  box-shadow:0 8px 22px rgba(0,0,0,.22);
  display:none;
}

/* ANIMATIONS */
.jump{
  animation:jumpAnim .45s ease;
}

@keyframes jumpAnim{
  0%{transform:translateY(0);}
  50%{transform:translateY(-55px);}
  100%{transform:translateY(0);}
}

.fall{
  animation:fallAnim 1.1s forwards;
}

@keyframes fallAnim{
  to{
    transform:translateY(720px) rotate(80deg) scale(.55);
    opacity:0;
  }
}

.flash{
  animation:flashAnim .5s ease;
}

@keyframes flashAnim{
  0%{filter:brightness(1);}
  50%{filter:brightness(2);}
  100%{filter:brightness(1);}
}

</style>
</head>

<body>
<div id="game">
  <div id="sky-glow"></div>

  <div id="emerald-city">
    <div class="tower one"></div>
    <div class="tower two"></div>
    <div class="tower three"></div>
  </div>

  <div id="title">EMERALD PATH QUEST</div>

  <div id="ui">
    <div class="ui-box" id="timerBox">⏰ 75</div>
    <div class="ui-box" id="scoreBox">♦ 0</div>
    <div class="ui-box" id="shieldBox">🛡️ 1</div>
  </div>

  <div id="startScreen">
    <div id="missionBox">
      <h1>Emerald Mission</h1>
      <p>Collect the emeralds to reveal the Yellow Brick Road. Help Ellie reach the Emerald City!</p>
      <button id="startBtn">START</button>
    </div>
  </div>

  <div id="hero">
    <div class="hair"></div>
    <div class="head">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="smile"></div>
    </div>
    <div class="arm left"></div>
    <div class="arm right"></div>
    <div class="dress"></div>
    <div class="shoe left"></div>
    <div class="shoe right"></div>
  </div>

  <div id="questionBox">
    <h2 id="question"></h2>
    <button class="answer" onclick="checkAnswer(0)"></button>
    <button class="answer" onclick="checkAnswer(1)"></button>
    <button class="answer" onclick="checkAnswer(2)"></button>
  </div>

  <div id="message"></div>
</div>

<script>
const game = document.getElementById("game");
const hero = document.getElementById("hero");
const questionBox = document.getElementById("questionBox");
const questionText = document.getElementById("question");
const timerBox = document.getElementById("timerBox");
const scoreBox = document.getElementById("scoreBox");
const shieldBox = document.getElementById("shieldBox");
const startScreen = document.getElementById("startScreen");
const message = document.getElementById("message");

let currentStep = 0;
let score = 0;
let shields = 1;
let timeLeft = 75;
let timer = null;
let selectedPlatform = null;
let gameStarted = false;

const questions = [
  {
    question:"Choose the correct sentence:",
    answers:["She go to the city.", "She goes to the city.", "She going to the city."],
    correct:1
  },
  {
    question:"Past Simple of FIND:",
    answers:["found", "finded", "founded"],
    correct:0
  },
  {
    question:"Ellie ___ an emerald.",
    answers:["collect", "collects", "collecting"],
    correct:1
  },
  {
    question:"Choose the correct word:",
    answers:["brave", "bravely", "bravery"],
    correct:0
  },
  {
    question:"The road is yellow. It is a ___ road.",
    answers:["yellow brick", "brick yellow", "yellow bricks"],
    correct:0
  },
  {
    question:"Final challenge: What do we collect?",
    answers:["emeralds", "bananas", "snowballs"],
    correct:0
  }
];

const platforms = [];
const collectibles = [];
const positions = [];

/* WebAudio generated sounds: no external files needed */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, duration, type="sine", volume=.08){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}

function soundCollect(){
  playTone(880,.08,"triangle",.08);
  setTimeout(()=>playTone(1320,.12,"triangle",.06),70);
}

function soundReveal(){
  playTone(520,.12,"sine",.06);
  setTimeout(()=>playTone(780,.13,"sine",.06),80);
}

function soundJump(){
  playTone(360,.08,"square",.035);
}

function soundFall(){
  playTone(190,.25,"sawtooth",.08);
  setTimeout(()=>playTone(90,.35,"sawtooth",.07),120);
}

function soundFinish(){
  [520,660,780,1040].forEach((f,i)=>setTimeout(()=>playTone(f,.18,"triangle",.08),i*120));
}

function soundShield(){
  playTone(260,.1,"square",.06);
  setTimeout(()=>playTone(620,.16,"triangle",.07),100);
}

function buildPath(){
  const count = questions.length;
  const startX = 135;
  const spacing = 170;
  const baseY = 555;
  const wave = 24;

  for(let i=0; i<count; i++){
    const x = startX + i * spacing;
    const y = baseY + Math.sin(i * .8) * wave;
    positions.push({x,y});

    const platform = document.createElement("div");
    platform.className = "platform locked";
    platform.style.left = x + "px";
    platform.style.top = y + "px";
    platform.onclick = () => clickPlatform(i, platform);
    platforms.push(platform);
    game.appendChild(platform);

    const emerald = document.createElement("div");
    emerald.className = "collectible";
    emerald.style.left = (x + 44) + "px";
    emerald.style.top = (y - 78) + "px";
    emerald.onclick = () => collectEmerald(i, emerald);
    collectibles.push(emerald);
    game.appendChild(emerald);
  }
}

function setStartPosition(){
  hero.classList.remove("fall");
  hero.style.opacity = "1";
  hero.style.transform = "none";
  hero.style.left = "32px";
  hero.style.top = "482px";
}

function startGame(){
  audioCtx.resume();
  gameStarted = true;
  startScreen.style.display = "none";
  showMessage("Collect the emerald above the first tile!");
  startTimer();
}

function startTimer(){
  timer = setInterval(()=>{
    if(!gameStarted) return;
    timeLeft--;
    timerBox.textContent = "⏰ " + timeLeft;
    if(timeLeft <= 0){
      clearInterval(timer);
      gameStarted = false;
      showMessage("Time is over! The road disappeared!");
      soundFall();
      hero.classList.add("fall");
    }
  },1000);
}

function collectEmerald(index, emerald){
  if(!gameStarted) return;
  if(index !== currentStep) return;

  soundCollect();
  emerald.remove();
  score++;
  scoreBox.textContent = "♦ " + score;

  const platform = platforms[index];
  platform.classList.remove("locked");
  platform.classList.add("active");
  platform.classList.add("flash");

  soundReveal();
  showMessage("The next tile is revealed! Click it.");
}

function clickPlatform(index, platform){
  if(!gameStarted) return;
  if(index !== currentStep) return;
  if(!platform.classList.contains("active")){
    showMessage("Collect the emerald first!");
    return;
  }

  selectedPlatform = platform;
  moveHero(platform);

  setTimeout(()=>showQuestion(index),500);
}

function moveHero(platform){
  soundJump();
  hero.classList.remove("jump");
  void hero.offsetWidth;
  hero.classList.add("jump");

  const x = parseInt(platform.style.left);
  const y = parseInt(platform.style.top);
  hero.style.left = (x + 26) + "px";
  hero.style.top = (y - 100) + "px";
}

function showQuestion(index){
  const q = questions[index];
  questionText.textContent = q.question;
  document.querySelectorAll(".answer").forEach((btn,i)=>{
    btn.textContent = q.answers[i];
  });
  questionBox.style.display = "block";
}

function checkAnswer(answerIndex){
  questionBox.style.display = "none";
  const q = questions[currentStep];

  if(answerIndex === q.correct){
    selectedPlatform.classList.remove("active");
    selectedPlatform.classList.add("completed");

    currentStep++;

    if(currentStep >= platforms.length){
      clearInterval(timer);
      gameStarted = false;
      soundFinish();
      showMessage("You reached the Emerald City!");
      setTimeout(()=>alert("MISSION COMPLETE! You reached the Emerald City!"),500);
      return;
    }

    showMessage("Correct! Collect the next emerald.");
  } else {
    if(shields > 0){
      shields--;
      shieldBox.textContent = "🛡️ " + shields;
      soundShield();
      showMessage("Magic shield saved you! Try again.");
      setTimeout(()=>showQuestion(currentStep),700);
    } else {
      soundFall();
      showMessage("Wrong answer! The road vanished!");
      selectedPlatform.classList.remove("active");
      hero.classList.add("fall");
      gameStarted = false;
      clearInterval(timer);
    }
  }
}

function showMessage(text){
  message.textContent = text;
  message.style.display = "block";
  clearTimeout(message.hideTimer);
  message.hideTimer = setTimeout(()=>{
    message.style.display = "none";
  },2300);
}

document.getElementById("startBtn").onclick = startGame;

buildPath();
setStartPosition();
</script>
</body>
</html>
