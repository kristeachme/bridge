<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Step Quest Bridge — Working Test</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#07101f}
#game{position:relative;width:100vw;height:100vh;overflow:hidden;background:linear-gradient(#89d8ff 0%,#bfefff 48%,#5baed0 49%,#226b8f 100%)}
.cloud{position:absolute;background:white;border-radius:999px;opacity:.86;filter:drop-shadow(0 3px 2px rgba(0,0,0,.08))}.cloud:before,.cloud:after{content:"";position:absolute;background:white;border-radius:50%}.cloud:before{width:55px;height:55px;left:28px;top:-25px}.cloud:after{width:72px;height:72px;left:72px;top:-38px}.c1{width:170px;height:48px;left:55px;top:70px}.c2{width:210px;height:55px;right:120px;top:90px}.c3{width:145px;height:40px;left:48%;top:130px}.cliff{position:absolute;bottom:0;width:205px;height:260px;background:linear-gradient(90deg,#69513f,#a17655,#604636);border:5px solid rgba(0,0,0,.18);z-index:10}.cliff.left{left:0;border-radius:0 36px 0 0}.cliff.right{right:0;border-radius:36px 0 0 0}.grass{position:absolute;top:-34px;width:100%;height:62px;background:#69b560;border-radius:40% 40% 18px 18px;border-bottom:5px solid #447d3c}
#bridgeLayer{position:absolute;inset:0;z-index:25;pointer-events:none}.rope{position:absolute;height:8px;border-radius:20px;background:linear-gradient(90deg,#6a4324,#b77a3c,#6a4324);transform-origin:left center;box-shadow:0 4px 5px rgba(0,0,0,.25)}.post{position:absolute;width:36px;height:135px;border-radius:18px 18px 10px 10px;background:linear-gradient(90deg,#74451f,#c98c46,#74451f);border:4px solid #553116;box-shadow:0 8px 12px rgba(0,0,0,.25)}.sign{position:absolute;width:94px;height:58px;border-radius:12px;background:linear-gradient(#d9ad6f,#a56e38);border:4px solid #663d20;color:#4b2c18;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;box-shadow:0 6px 10px rgba(0,0,0,.24)}.sign:after{content:"";position:absolute;bottom:-34px;left:42px;width:10px;height:34px;background:#663d20;border-radius:8px}
.platform{position:absolute;width:82px;height:58px;border-radius:14px;z-index:45;cursor:pointer;transition:.28s;filter:grayscale(1) brightness(.48);opacity:.58;background:linear-gradient(135deg,rgba(255,255,255,.72),rgba(139,240,255,.8) 45%,rgba(84,205,230,.82));border:4px solid rgba(255,255,255,.75);box-shadow:inset -8px -8px 0 rgba(0,75,100,.18),0 8px 12px rgba(0,0,0,.25)}.platform.active{filter:none;opacity:1;box-shadow:0 0 22px rgba(66,255,220,.95),inset -8px -8px 0 rgba(0,75,100,.12),0 8px 12px rgba(0,0,0,.25)}.platform.completed{filter:none;opacity:1;background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(49,255,202,.85) 45%,rgba(9,194,148,.9));box-shadow:0 0 18px rgba(66,255,220,.75),inset -8px -8px 0 rgba(0,75,100,.12),0 8px 12px rgba(0,0,0,.25)}.num{position:absolute;left:50%;bottom:-34px;transform:translateX(-50%);min-width:32px;height:30px;padding:0 8px;border-radius:8px;background:#624126;color:white;font-size:19px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 6px rgba(0,0,0,.24)}
.crystal{position:absolute;width:46px;height:58px;z-index:80;cursor:pointer;animation:float 1.45s infinite ease-in-out;filter:drop-shadow(0 0 13px rgba(41,255,152,.95))}.crystal:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,#e8fff3,#23ee82 45%,#008241);clip-path:polygon(50% 0,88% 24%,74% 80%,50% 100%,26% 80%,12% 24%);border-radius:6px}.crystal.inactive{opacity:.28;filter:grayscale(1);pointer-events:none}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#hero{position:absolute;width:86px;height:104px;z-index:100;transition:.45s ease;transform-origin:center bottom}.cat-body{position:absolute;left:12px;top:42px;width:62px;height:45px;background:#a8a8a8;border:4px solid #666;border-radius:50%}.cat-head{position:absolute;left:18px;top:16px;width:54px;height:50px;background:#c9c9c9;border:4px solid #666;border-radius:50%}.ear{position:absolute;top:-14px;width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:24px solid #666}.ear.l{left:5px}.ear.r{right:5px}.eye{position:absolute;top:19px;width:7px;height:7px;background:#111;border-radius:50%}.eye.l{left:14px}.eye.r{right:14px}.tail{position:absolute;left:-7px;top:55px;width:38px;height:14px;border-radius:20px;border:4px solid #666;border-right:0;transform:rotate(-35deg)}.hat{position:absolute;left:16px;top:0;width:58px;height:18px;background:#c59b5d;border:4px solid #6e4b24;border-radius:50%}.hat:before{content:"";position:absolute;left:12px;top:-20px;width:31px;height:23px;background:#c59b5d;border:4px solid #6e4b24;border-bottom:0;border-radius:10px 10px 0 0}
#ui{position:absolute;top:18px;left:20px;right:20px;z-index:300;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}.uiGroup{display:flex;gap:12px;align-items:center;pointer-events:auto}.box{min-height:54px;padding:12px 18px;border-radius:18px;background:rgba(255,255,255,.92);font-size:24px;font-weight:900;color:#3b2d20;box-shadow:0 8px 18px rgba(0,0,0,.18);display:flex;align-items:center;gap:8px}.collected span{display:inline-flex;width:26px;height:26px;margin-left:4px;border-radius:50%;border:3px solid #c7bba8;background:#f6f0e6}.collected span.filled{border:0;background:linear-gradient(135deg,#e8fff3,#23ee82,#008241);clip-path:polygon(50% 0,88% 24%,74% 80%,50% 100%,26% 80%,12% 24%);border-radius:4px}#muteBtn{border:0;background:transparent;font-size:24px;cursor:pointer}#volume{width:110px}
#startScreen{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}.modal{width:min(610px,90vw);background:#fff8e8;border:5px solid #e1b95d;border-radius:28px;padding:30px;text-align:center;box-shadow:0 18px 45px rgba(0,0,0,.35)}.modal h1{margin:0 0 12px;font-size:42px}.modal p{font-size:22px;line-height:1.4;margin:0}.modal button{margin-top:24px;border:0;border-radius:20px;background:#22b36b;color:white;padding:16px 38px;font-size:28px;font-weight:900;cursor:pointer;box-shadow:0 8px 0 #137443}
#questionBox{position:absolute;left:50%;bottom:28px;transform:translateX(-50%);width:min(760px,88vw);background:#fff8e8;border:5px solid #e1b95d;border-radius:28px;padding:22px;z-index:420;display:none;box-shadow:0 14px 38px rgba(0,0,0,.28)}#questionText{text-align:center;margin:0 0 18px;font-size:34px;color:#403122}.answers{display:flex;gap:18px}.answer{flex:1;border:3px solid #d2c4aa;background:white;border-radius:18px;padding:18px;font-size:30px;font-weight:900;color:#403122;cursor:pointer}.answer:hover{background:#eafff6;border-color:#22b36b}
#message{position:absolute;left:50%;bottom:270px;transform:translateX(-50%);z-index:450;display:none;max-width:80vw;background:rgba(255,255,255,.94);border-radius:18px;padding:14px 24px;font-size:22px;font-weight:900;color:#2f493b;box-shadow:0 8px 22px rgba(0,0,0,.22)}.jump{animation:jump .45s ease}@keyframes jump{0%,100%{transform:translateY(0)}50%{transform:translateY(-60px)}}.shake{animation:shake .35s ease}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-6px)}}.fall{animation:fall 1.1s forwards}@keyframes fall{to{transform:translateY(680px) rotate(90deg) scale(.5);opacity:0}}.particle{position:absolute;width:8px;height:8px;border-radius:50%;background:#49ffbd;box-shadow:0 0 12px #49ffbd;z-index:600;pointer-events:none;animation:pop .65s forwards}@keyframes pop{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
</style>
</head>
<body>
<div id="game">
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
  <div class="cliff left"><div class="grass"></div></div><div class="cliff right"><div class="grass"></div></div>
  <div id="bridgeLayer"></div>
  <div id="ui"><div class="uiGroup"><div class="box" id="lives">❤️❤️❤️</div><div class="box" id="score">Score: 0 ⭐</div><div class="box collected" id="collected">Collected:</div></div><div class="uiGroup"><div class="box"><button id="muteBtn">🔊</button><input id="volume" type="range" min="0" max="100" value="70"></div></div></div>
  <div id="hero"><div class="tail"></div><div class="cat-body"></div><div class="cat-head"><div class="ear l"></div><div class="ear r"></div><div class="eye l"></div><div class="eye r"></div></div><div class="hat"></div></div>
  <div id="startScreen"><div class="modal"><h1>Crystal Bridge Quest</h1><p>Click the crystals. The hero will jump across 12 crystal platforms. Answer questions and reach point B!</p><button id="startBtn">START</button></div></div>
  <div id="questionBox"><h2 id="questionText"></h2><div class="answers" id="answers"></div></div>
  <div id="message"></div>
</div>
<script>
const CONFIG={platformCount:12,startX:178,baseY:465,spacing:82,arcDepth:55,wave:8,lives:3,pointsCollect:10,pointsCorrect:20,volume:.7,sound:true,questions:[
{q:'7 + 5 = ?',a:['10','12','13'],c:1},{q:'Choose the correct sentence:',a:['She go','She goes','She going'],c:1},{q:'Past of GO:',a:['goed','went','gone'],c:1},{q:'2 + 2 = ?',a:['3','4','5'],c:1},{q:'I ___ a book.',a:['read','reads','reading'],c:0},{q:'Choose the animal:',a:['table','cat','window'],c:1},{q:'5 + 3 = ?',a:['6','8','9'],c:1},{q:'He ___ football.',a:['play','plays','playing'],c:1},{q:'Past of SEE:',a:['saw','seed','seen'],c:0},{q:'10 - 4 = ?',a:['5','6','7'],c:1},{q:'They ___ happy.',a:['is','are','am'],c:1},{q:'Final: choose magic word',a:['Emerald','Potato','Chair'],c:0}]};
const game=document.getElementById('game'), bridgeLayer=document.getElementById('bridgeLayer'), hero=document.getElementById('hero'), startScreen=document.getElementById('startScreen'), questionBox=document.getElementById('questionBox'), questionText=document.getElementById('questionText'), answers=document.getElementById('answers'), livesBox=document.getElementById('lives'), scoreBox=document.getElementById('score'), collectedBox=document.getElementById('collected'), message=document.getElementById('message');
let state, platforms=[], crystals=[], positions=[], selected=null, audioCtx=null;
function init(){state={started:false,step:0,lives:CONFIG.lives,score:0,collected:0,gameOver:false}; build(); render();}
function build(){platforms.forEach(e=>e.remove());crystals.forEach(e=>e.remove());bridgeLayer.innerHTML='';platforms=[];crystals=[];positions=[];for(let i=0;i<CONFIG.platformCount;i++){let t=i/(CONFIG.platformCount-1),x=CONFIG.startX+i*CONFIG.spacing,y=CONFIG.baseY+Math.sin(Math.PI*t)*CONFIG.arcDepth+Math.sin(i*.8)*CONFIG.wave;positions.push({x,y});}
buildBridge(); positions.forEach((p,i)=>{let pl=document.createElement('div');pl.className='platform';pl.style.left=p.x+'px';pl.style.top=p.y+'px';pl.innerHTML='<div class="num">'+(i+1)+'</div>';platforms.push(pl);game.appendChild(pl);let cr=document.createElement('div');cr.className='crystal';cr.style.left=(p.x+18)+'px';cr.style.top=(p.y-72)+'px';cr.onclick=()=>collect(i,cr);crystals.push(cr);game.appendChild(cr);}); setHeroStart();}
function buildBridge(){let first=positions[0],last=positions.at(-1),startX=first.x-80,endX=last.x+120,startY=first.y-35,endY=last.y-35;post(startX-28,first.y-88);post(startX+18,first.y-78);post(endX-24,last.y-82);post(endX+22,last.y-92);sign(startX-120,first.y-108,'A');sign(endX+20,last.y-112,'B');rope(startX,startY+16,endX,endY+16);rope(startX,startY+86,endX,endY+86);positions.forEach(p=>rope(p.x+41,p.y-30,p.x+41,p.y+83));}
function rope(x1,y1,x2,y2){let r=document.createElement('div');r.className='rope';let dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)*180/Math.PI;r.style.left=x1+'px';r.style.top=y1+'px';r.style.width=len+'px';r.style.transform=`rotate(${ang}deg)`;bridgeLayer.appendChild(r);}function post(x,y){let e=document.createElement('div');e.className='post';e.style.left=x+'px';e.style.top=y+'px';bridgeLayer.appendChild(e)}function sign(x,y,t){let e=document.createElement('div');e.className='sign';e.style.left=x+'px';e.style.top=y+'px';e.textContent=t;bridgeLayer.appendChild(e)}
function setHeroStart(){hero.className='';hero.style.opacity=1;hero.style.transform='none';hero.style.left='70px';hero.style.top=(CONFIG.baseY-100)+'px'}
document.getElementById('startBtn').onclick=()=>{state.started=true;startScreen.style.display='none';show('Click the first crystal!')};
function collect(i,cr){if(!state.started||state.gameOver||i!==state.step)return; sound('collect'); particles(cr); cr.remove(); state.collected++; state.score+=CONFIG.pointsCollect; selected=platforms[i]; selected.classList.add('active'); render(); setTimeout(()=>jumpTo(selected),180); setTimeout(()=>showQuestion(i),720);}
function jumpTo(pl){sound('jump');hero.classList.remove('jump');void hero.offsetWidth;hero.classList.add('jump');hero.style.left=(parseInt(pl.style.left)+6)+'px';hero.style.top=(parseInt(pl.style.top)-96)+'px'}
function showQuestion(i){let q=CONFIG.questions[i%CONFIG.questions.length];questionText.textContent=q.q;answers.innerHTML='';q.a.forEach((a,idx)=>{let b=document.createElement('button');b.className='answer';b.textContent=a;b.onclick=()=>check(idx);answers.appendChild(b)});questionBox.style.display='block'}
function check(idx){let q=CONFIG.questions[state.step%CONFIG.questions.length];if(idx===q.c){sound('correct');questionBox.style.display='none';selected.classList.remove('active');selected.classList.add('completed');state.score+=CONFIG.pointsCorrect;state.step++;render();if(state.step>=CONFIG.platformCount){sound('finish');show('Mission complete!');setTimeout(()=>alert('MISSION COMPLETE!'),500)}else show('Correct! Click the next crystal.')}else{sound('wrong');state.lives--;render();hero.classList.remove('shake');void hero.offsetWidth;hero.classList.add('shake');if(state.lives<=0){questionBox.style.display='none';gameOver()}else{show('Wrong! Try again. Lives left: '+state.lives);setTimeout(()=>showQuestion(state.step),700)}}}
function gameOver(){state.gameOver=true;sound('fall');show('No lives left! Restarting...');hero.classList.add('fall');setTimeout(()=>{startScreen.style.display='flex';init()},1800)}
function render(){livesBox.textContent='❤️'.repeat(Math.max(0,state.lives));scoreBox.textContent='Score: '+state.score+' ⭐';collectedBox.innerHTML='Collected:';for(let i=0;i<CONFIG.platformCount;i++){let s=document.createElement('span');if(i<state.collected)s.classList.add('filled');collectedBox.appendChild(s)}}
function show(t){message.textContent=t;message.style.display='block';clearTimeout(message.timer);message.timer=setTimeout(()=>message.style.display='none',2100)}
document.getElementById('muteBtn').onclick=()=>{CONFIG.sound=!CONFIG.sound;document.getElementById('muteBtn').textContent=CONFIG.sound?'🔊':'🔇'};document.getElementById('volume').oninput=e=>CONFIG.volume=e.target.value/100;
function ensureAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}function tone(f,d,type='sine'){if(!CONFIG.sound||CONFIG.volume<=0)return;ensureAudio();let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.value=.08*CONFIG.volume;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}function sound(t){if(t==='collect'){tone(880,.08,'triangle');setTimeout(()=>tone(1320,.1,'triangle'),70)}else if(t==='jump')tone(360,.08,'square');else if(t==='correct'){tone(760,.1,'triangle');setTimeout(()=>tone(1040,.1,'triangle'),80)}else if(t==='wrong')tone(180,.16,'sawtooth');else if(t==='fall'){tone(190,.25,'sawtooth');setTimeout(()=>tone(90,.35,'sawtooth'),120)}else if(t==='finish'){[520,660,780,1040].forEach((f,i)=>setTimeout(()=>tone(f,.15,'triangle'),i*120))}}
function particles(el){let r=el.getBoundingClientRect(),gr=game.getBoundingClientRect(),cx=r.left-gr.left+r.width/2,cy=r.top-gr.top+r.height/2;for(let i=0;i<14;i++){let p=document.createElement('div');p.className='particle';p.style.left=cx+'px';p.style.top=cy+'px';let a=Math.PI*2*i/14,d=38+Math.random()*26;p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');game.appendChild(p);setTimeout(()=>p.remove(),700)}}
init();
</script>
</body>
</html>
